<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      width: 280px;
      margin: 0;
      font-family: "Roboto", Arial, sans-serif;
      background: #1f1f1f;
      color: #fff;
    }
    .head {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px;
      background: #ff0000;
      font-weight: 600;
      font-size: 15px;
    }
    .body { padding: 14px 16px; font-size: 13px; line-height: 1.5; }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 8px;
      background: #2a2a2a;
      margin-bottom: 12px;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #888; }
    .dot.on { background: #2ecc71; }
    .dot.off { background: #e53935; }
    .hint { opacity: 0.7; font-size: 12px; }
    code {
      background: #000;
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="head">⬇ YT Downloader</div>
  <div class="body">
    <div class="status">
      <span class="dot" id="dot"></span>
      <span id="status-text">Проверка сервера...</span>
    </div>
    <div id="save-dir" class="hint"></div>
    <p class="hint">
      Открой любое видео на YouTube — кнопка <b>«Скачать»</b> появится слева от лайка.
    </p>
    <p class="hint">
      Если сервер выключен, запусти <code>start_server.bat</code> в папке <code>server</code>.
    </p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
